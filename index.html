<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Foundry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #0d0d0f;
            --ink: #e8e6e1;
            --ink-light: #8a8580;
            --ink-faint: #5a5550;
            --warm: #c75d3a;
            --warm-dim: #a3482e;
            --cool: #6b8cae;
            --cool-dim: #4a6f8c;
            --rule: #1e1e22;
            --rule-heavy: #2a2a30;
            --highlight: rgba(199, 93, 58, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: #070708;
        }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.5;
            min-height: 100vh;
            max-width: 680px;
            margin: 0 auto;
            padding: 48px 28px 80px;
            border-left: 1px solid var(--rule);
            border-right: 1px solid var(--rule);
            position: relative;
            box-shadow: 0 0 80px rgba(0,0,0,0.3);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 680px;
            height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: radial-gradient(circle, transparent 30%, var(--rule-heavy) 35%, transparent 40%);
            background-size: 12px 8px;
            opacity: 0.3;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 2px dashed var(--rule);
        }

        .stamp {
            display: inline-block;
            border: 2px solid var(--warm);
            color: var(--warm);
            padding: 6px 14px;
            font-family: 'Fragment Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transform: rotate(-1deg);
            margin-bottom: 20px;
            opacity: 0.85;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .tagline {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.8rem;
            color: var(--ink-light);
            font-style: italic;
            line-height: 1.6;
        }

        .search-box {
            position: relative;
            margin-bottom: 28px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 40px;
            background: transparent;
            border: 1.5px solid var(--rule);
            border-radius: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--ink-light);
        }

        .search-box input::placeholder {
            color: var(--ink-faint);
            font-style: italic;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-faint);
            font-size: 13px;
        }

        .receipt-line {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            font-family: 'Fragment Mono', monospace;
            font-size: 0.75rem;
            color: var(--ink-light);
        }

        .receipt-line .dots {
            flex: 1;
            border-bottom: 1px dotted var(--rule);
            margin: 0 8px;
            position: relative;
            top: -3px;
        }

        .trait {
            padding: 18px 0;
            border-bottom: 1px solid var(--rule);
            position: relative;
        }

        .trait:first-child {
            border-top: 1px solid var(--rule);
        }

        .trait-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 6px;
        }

        .trait-name {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--ink);
            letter-spacing: -0.01em;
        }

        .trait-name::before {
            content: '>';
            color: var(--warm);
            margin-right: 8px;
            font-weight: 400;
        }

        .trait-badge {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 2px 8px;
            border: 1px solid var(--rule-heavy);
            color: var(--ink-light);
            flex-shrink: 0;
            transform: rotate(0.5deg);
        }

        .trait-badge.verified {
            border-color: var(--cool-dim);
            color: var(--cool);
            background: rgba(107, 140, 174, 0.06);
        }

        .trait-desc {
            color: var(--ink-light);
            font-size: 0.85rem;
            line-height: 1.55;
            margin-bottom: 10px;
            padding-left: 18px;
        }

        .trait-meta {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.7rem;
            color: var(--ink-faint);
            padding-left: 18px;
            margin-bottom: 12px;
        }

        .install-stamp {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--highlight);
            border: 1px dashed var(--warm-dim);
            padding: 8px 12px;
            margin-left: 18px;
            font-family: 'Fragment Mono', monospace;
            font-size: 0.78rem;
            color: var(--warm-dim);
            cursor: pointer;
            transition: all 0.15s;
            user-select: all;
        }

        .install-stamp:hover {
            background: rgba(199, 93, 58, 0.15);
            border-style: solid;
        }

        .install-stamp.copied {
            background: rgba(107, 140, 174, 0.1);
            border-color: var(--cool);
            color: var(--cool);
        }

        .install-stamp .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.7;
        }

        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--ink-faint);
            font-family: 'Fragment Mono', monospace;
            font-size: 0.8rem;
            font-style: italic;
        }

        footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 2px dashed var(--rule);
            text-align: center;
        }

        .barcode {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.9rem;
            color: var(--ink-faint);
            letter-spacing: 0.15em;
            margin-bottom: 16px;
            opacity: 0.4;
            word-break: break-all;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        footer a {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.7rem;
            color: var(--ink-light);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--warm);
        }

        .attribution {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.65rem;
            color: var(--ink-faint);
            font-style: italic;
        }

        .attribution a {
            color: var(--ink-light);
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .attribution a:hover {
            color: var(--warm);
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: var(--ink-faint);
            font-family: 'Fragment Mono', monospace;
            font-size: 0.8rem;
            font-style: italic;
        }

        ::selection {
            background: var(--warm);
            color: var(--paper);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--rule);
        }

        @media (max-width: 600px) {
            body {
                border: none;
                padding: 32px 20px 60px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .trait-header {
                flex-direction: column;
                gap: 6px;
            }

            .install-stamp {
                margin-left: 0;
                display: flex;
                flex-wrap: wrap;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <header>
            <div class="stamp">registry</div>
            <h1>Ethos Foundry</h1>
            <p class="tagline">Hard traits registry for Ethos — native extensions, pre-built for your platform.</p>
        </header>

        <div class="search-box">
            <span class="search-icon">/</span>
            <input type="text" id="search" placeholder="search traits..." autocomplete="off">
        </div>

        <div class="receipt-line">
            <span id="count">—</span>
            <span class="dots"></span>
            <span>indexed</span>
        </div>

        <div id="list">
            <div class="loading">Fetching index...</div>
        </div>

        <footer>
            <div class="barcode">|| | ||| | | |||| | || | |||</div>
            <div class="footer-links">
                <a href="https://github.com/AmanCode22/ethos-foundry" target="_blank" rel="noopener">GitHub</a>
                <a href="https://foundry-ethos.pages.dev/" target="_blank" rel="noopener">Registry</a>
                <a href="https://github.com/AmanCode22/ethos-lang/blob/main/DOCS.md" target="_blank" rel="noopener">Docs</a>
                <a href="https://github.com/AmanCode22/forge" target="_blank" rel="noopener">Forge</a>
            </div>
            <div class="attribution">
                built by <a href="https://github.com/AmanCode22" target="_blank" rel="noopener">aman adlakha</a> · class 9, india
            </div>
        </footer>
    </div>

    <script>
        let traits = {};
        let searchTimeout = null;
        let currentItems = [];

        function getBadge(t) {
            if (t.verified) {
                return '<span class="trait-badge verified">verified</span>';
            }
            if ((t.tags || []).includes('official')) {
                return '<span class="trait-badge">official</span>';
            }
            return '';
        }

        function copyInstall(name, el) {
            const cmd = `forge foundry get ${name}`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(cmd).then(() => markCopied(el));
            } else {
                const ta = document.createElement('textarea');
                ta.value = cmd;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                markCopied(el);
            }
        }

        function markCopied(el) {
            el.classList.add('copied');
            const original = el.innerHTML;
            el.innerHTML = '<span class="label">ok</span> copied to clipboard';
            setTimeout(() => {
                el.classList.remove('copied');
                el.innerHTML = original;
            }, 1800);
        }

        function buildHTML(items) {
            if (items.length === 0) {
                return '<div class="empty">no traits match</div>';
            }

            return items.map(([name, t]) => `
                <article class="trait" data-name="${name}">
                    <div class="trait-header">
                        <h3 class="trait-name">${name}</h3>
                        ${getBadge(t)}
                    </div>
                    <p class="trait-desc">${t.description || 'No description provided.'}</p>
                    <div class="trait-meta">
                        by ${t.author || 'unknown'}${t.version ? ` · v${t.version}` : ''}
                    </div>
                    <div class="install-stamp" onclick="copyInstall('${name}', this)">
                        <span class="label">install</span>
                        <span>forge foundry get ${name}</span>
                    </div>
                </article>
            `).join('');
        }

        function render(filter = '') {
            const el = document.getElementById('list');
            const q = filter.trim().toLowerCase();

            const items = Object.entries(traits).filter(([name, t]) => {
                if (!q) return true;
                const hay = [
                    name,
                    t.description || '',
                    (t.tags || []).join(' '),
                    t.author || ''
                ].join(' ').toLowerCase();
                return hay.includes(q);
            });

            document.getElementById('count').textContent = items.length;

            const newHTML = buildHTML(items);
            const oldHTML = el.innerHTML;

            if (newHTML !== oldHTML) {
                el.innerHTML = newHTML;
            }

            currentItems = items;
        }

        function debouncedRender(filter) {
            if (searchTimeout) {
                clearTimeout(searchTimeout);
            }
            searchTimeout = setTimeout(() => {
                render(filter);
            }, 120);
        }

        fetch('index.json')
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                traits = (data && data.traits) || {};
                render();
            })
            .catch(err => {
                console.error('Failed to load index.json:', err);
                document.getElementById('list').innerHTML = 
                    '<div class="empty">could not load index.json<br>make sure the file exists in the repo root</div>';
            });

        document.getElementById('search').addEventListener('input', e => {
            debouncedRender(e.target.value);
        });

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search').focus();
            }
        });
    </script>
</body>
</html>
