<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Foundry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b10;
            --surface: #0e1420;
            --surface2: #141c2e;
            --border: #1e2d47;
            --border-bright: #2a4060;
            --text: #dce8f5;
            --text-dim: #5a7a9a;
            --text-mid: #8aaac8;
            --accent: #3d9fff;
            --accent2: #00d4aa;
            --accent-glow: rgba(61,159,255,0.15);
            --verified: #00d4aa;
            --verified-bg: rgba(0,212,170,0.08);
            --official: #f5a623;
            --official-bg: rgba(245,166,35,0.08);
            --code: #ff6b8a;
            --code-bg: rgba(255,107,138,0.07);
            --mono: "JetBrains Mono", monospace;
            --sans: "Syne", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 60% 40% at 80% 10%, rgba(61,159,255,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 10% 80%, rgba(0,212,170,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
            padding: 60px 24px 80px;
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 48px;
            animation: fadeUp 0.6s ease both;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 24px rgba(61,159,255,0.3);
            flex-shrink: 0;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text) 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-mid);
            font-size: 0.95rem;
            font-weight: 400;
            font-family: var(--mono);
            padding-left: 56px;
            line-height: 1.5;
        }

        .subtitle em {
            color: var(--accent);
            font-style: normal;
        }

        .search-wrap {
            position: relative;
            margin: 32px 0;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .search-icon {
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
            font-family: var(--mono);
        }

        .kbd {
            position: absolute;
            right: 14px; top: 50%;
            transform: translateY(-50%);
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 2px 7px;
            border-radius: 4px;
            pointer-events: none;
        }

        #search {
            width: 100%;
            padding: 14px 80px 14px 44px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: var(--mono);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            letter-spacing: 0.01em;
        }

        #search:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.3);
        }

        #search::placeholder { color: var(--text-dim); }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            animation: fadeUp 0.6s 0.15s ease both;
        }

        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-bar .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 6px var(--accent2);
        }

        #list { animation: fadeUp 0.6s 0.2s ease both; }

        .trait {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px 24px;
            margin-bottom: 12px;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .trait::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: 12px 0 0 12px;
        }

        .trait:hover {
            border-color: var(--border-bright);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px var(--border-bright);
        }

        .trait:hover::before { opacity: 1; }

        .trait-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .trait h3 {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--mono);
            color: var(--accent);
            letter-spacing: -0.01em;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            font-family: var(--mono);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .verified {
            background: var(--verified-bg);
            color: var(--verified);
            border: 1px solid rgba(0,212,170,0.2);
        }

        .official {
            background: var(--official-bg);
            color: var(--official);
            border: 1px solid rgba(245,166,35,0.2);
        }

        .trait-desc {
            color: var(--text-mid);
            font-size: 0.88rem;
            margin: 8px 0 12px;
            line-height: 1.6;
        }

        .trait-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--text-dim);
            margin-bottom: 14px;
        }

        .trait-meta span { display: flex; align-items: center; gap: 5px; }

        .install {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .install-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }

        .install code {
            font-family: var(--mono);
            font-size: 0.82rem;
            color: var(--code);
            flex: 1;
            letter-spacing: 0.01em;
        }

        .install-btn {
            background: linear-gradient(135deg, var(--accent), rgba(61,159,255,0.7));
            color: #080b10;
            border: none;
            padding: 5px 13px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            font-family: var(--mono);
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            flex-shrink: 0;
            letter-spacing: 0.02em;
        }

        .install-btn:hover { opacity: 0.88; }
        .install-btn:active { transform: scale(0.96); }

        .loading, .no-traits {
            text-align: center;
            color: var(--text-dim);
            padding: 60px 20px;
            font-family: var(--mono);
            font-size: 0.85rem;
        }

        .no-traits small {
            display: block;
            margin-top: 8px;
            color: var(--text-dim);
            opacity: 0.6;
        }

        .loading::after {
            content: '';
            display: block;
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 16px auto 0;
        }

        footer {
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--text-dim);
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .footer-links { display: flex; gap: 18px; flex-wrap: wrap; }

        footer a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.15s;
        }

        footer a:hover { color: var(--accent); }

        .footer-right { opacity: 0.6; }
        .footer-right a { color: inherit; }
        .footer-right a:hover { color: var(--accent); opacity: 1; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container { padding: 36px 16px 60px; }
            h1 { font-size: 1.9rem; }
            .subtitle { padding-left: 0; margin-top: 8px; }
            .logo-row { margin-bottom: 8px; }
            .trait { padding: 18px; }
            footer { flex-direction: column; align-items: flex-start; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-row">
                <div class="logo-icon">⚒</div>
                <h1>Ethos Foundry</h1>
            </div>
            <p class="subtitle">Hard Traits registry for <em>Ethos</em> — native C/C++/Rust extensions, pre-built for your platform.</p>
        </header>

        <div class="search-wrap">
            <span class="search-icon">$</span>
            <input type="text" id="search" placeholder="search traits..." aria-label="Search traits">
            <span class="kbd">⌘K</span>
        </div>

        <div class="stats-bar" id="stats">
            <span><span class="dot"></span><span id="count">—</span> traits available</span>
        </div>

        <div id="list">
            <p class="loading">Fetching index.json</p>
        </div>

        <footer>
            <div class="footer-links">
                <a href="https://github.com/AmanCode22/ethos-foundry" target="_blank" rel="noopener">github</a>
                <a href="https://foundry-ethos.pages.dev/" target="_blank" rel="noopener">cloudfare hosted registry</a>
                <a href="https://amancode22.github.io/ethos-foundry/" target="_blank" rel="noopener">github hosted registry</a>
                <a href="https://github.com/AmanCode22/ethos-lang/blob/main/DOCS.md" target="_blank" rel="noopener">docs</a>
                <a href="https://github.com/AmanCode22/forge" target="_blank" rel="noopener">forge</a>
            </div>
            <span class="footer-right">built by <a href="https://github.com/AmanCode22" target="_blank" rel="noopener">aman</a> · class 9, india</span>
        </footer>
    </div>

    <script>
        let traits = {};

        function copyInstall(traitName) {
            const cmd = `forge foundry get ${traitName}`;
            const btn = event.target;
            const original = btn.textContent;

            const finish = () => {
                btn.textContent = 'copied!';
                btn.style.background = 'linear-gradient(135deg, var(--accent2), rgba(0,212,170,0.7))';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = '';
                }, 1500);
            };

            if (navigator.clipboard) {
                navigator.clipboard.writeText(cmd).then(finish).catch(() => fallbackCopy(cmd, finish));
            } else {
                fallbackCopy(cmd, finish);
            }
        }

        function fallbackCopy(text, cb) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            cb();
        }

        function render(filter = '') {
            const el = document.getElementById('list');
            const q = filter.trim().toLowerCase();

            const items = Object.entries(traits).filter(([name, t]) => {
                if (!q) return true;
                const desc = (t.description || '').toLowerCase();
                const tags = (t.tags || []).join(' ').toLowerCase();
                return name.toLowerCase().includes(q) || desc.includes(q) || tags.includes(q);
            });

            document.getElementById('count').textContent = items.length;

            if (items.length === 0) {
                el.innerHTML = q
                    ? `<p class="no-traits">No traits match "<strong>${filter}</strong>"</p>`
                    : '<p class="no-traits">No traits published yet.<small>Be the first to submit one!</small></p>';
                return;
            }

            el.innerHTML = items.map(([name, t]) => {
                const badge = t.verified
                    ? '<span class="badge verified">✓ verified</span>'
                    : (t.tags || []).includes('official')
                        ? '<span class="badge official">★ official</span>'
                        : '';
                const author = t.author || 'unknown';
                const desc = t.description || 'No description provided.';

                return `
                    <article class="trait">
                        <div class="trait-header">
                            <h3>${name}</h3>
                            ${badge}
                        </div>
                        <p class="trait-desc">${desc}</p>
                        <div class="trait-meta">
                            <span>by ${author}</span>
                            ${t.version ? `<span>v${t.version}</span>` : ''}
                        </div>
                        <div class="install">
                            <span class="install-label">install</span>
                            <code>forge foundry get ${name}</code>
                            <button class="install-btn" onclick="copyInstall('${name}')" aria-label="Copy install command">copy</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        fetch('index.json')
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                traits = (data && data.traits) || {};
                document.getElementById('count').textContent = Object.keys(traits).length;
                render();
            })
            .catch(err => {
                console.error('Failed to load index.json:', err);
                document.getElementById('list').innerHTML =
                    '<p class="no-traits">Could not load index.json.<small>Make sure the file exists in the repo root.</small></p>';
            });

        document.getElementById('search').addEventListener('input', e => render(e.target.value));

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search').focus();
            }
        });
    </script>
</body>
</html>
