<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethos Foundry</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success-bg: #238636;
            --success-text: #3fb950;
            --warning-bg: #9e6a03;
            --warning-text: #d29922;
            --code-bg: #010409;
            --code-text: #ff7b72;
            --input-bg: #0d1117;
            --input-border: #30363d;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 850px; margin: 0 auto; padding: 40px 20px;
            background: var(--bg); color: var(--text); line-height: 1.6;
        }
        header { margin-bottom: 30px; }
        h1 { font-size: 2.2rem; margin-bottom: 8px; color: var(--text); font-weight: 600; }
        .subtitle { color: var(--text-dim); font-size: 1.05rem; }
        #search {
            width: 100%; padding: 12px 16px;
            background: var(--input-bg); border: 1px solid var(--input-border);
            border-radius: 8px; font-size: 1rem; margin: 25px 0;
            color: var(--text); transition: border-color 0.2s;
        }
        #search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.2); }
        #search::placeholder { color: var(--text-dim); opacity: 0.8; }
        .trait {
            background: var(--card); border: 1px solid var(--border);
            padding: 20px; margin-bottom: 14px; border-radius: 10px;
            transition: border-color 0.2s, transform 0.1s;
        }
        .trait:hover { border-color: var(--accent); transform: translateY(-1px); }
        .trait-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }        .trait h3 { color: var(--accent); font-size: 1.25rem; font-weight: 600; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 500;
        }
        .verified { background: var(--success-bg); color: var(--success-text); }
        .official { background: var(--warning-bg); color: var(--warning-text); }
        .trait p { color: var(--text-dim); margin: 10px 0; font-size: 0.95rem; }
        .trait-meta { font-size: 0.9rem; color: var(--text-dim); display: flex; gap: 15px; flex-wrap: wrap; }
        .trait-meta span { display: flex; align-items: center; gap: 5px; }
        .install {
            background: var(--code-bg); padding: 12px 14px; border-radius: 7px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.9rem; margin-top: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .install strong { color: var(--text-dim); }
        .install code { color: var(--code-text); background: rgba(255,123,114,0.1); padding: 2px 6px; border-radius: 4px; }
        .install-btn {
            background: var(--accent); color: #0d1117; border: none;
            padding: 6px 12px; border-radius: 5px; font-size: 0.85rem;
            cursor: pointer; font-weight: 500; transition: background 0.2s;
        }
        .install-btn:hover { background: var(--accent-hover); }
        .install-btn:active { transform: scale(0.98); }
        .loading, .no-traits { text-align: center; color: var(--text-dim); padding: 40px 20px; }
        .footer {
            margin-top: 50px; padding-top: 20px;
            border-top: 1px solid var(--border); color: var(--text-dim);
            font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }
        .footer a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        .footer a:hover { color: var(--accent-hover); }
        .footer-links { display: flex; gap: 15px; flex-wrap: wrap; }
        @media (max-width: 600px) {
            body { padding: 25px 15px; }
            h1 { font-size: 1.8rem; }
            .trait-header { flex-direction: column; align-items: flex-start; }
            .footer { flex-direction: column; align-items: flex-start; }
        }
        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🏭 Ethos Foundry</h1>
        <p class="subtitle">Hard Traits registry for Ethos. Native C/C++/Rust extensions, pre-built for your platform.</p>
    </header>
        <input type="text" id="search" placeholder="Search traits (e.g., math, crypto, network)..." aria-label="Search traits">
    
    <div id="list">
        <p class="loading">Loading traits from index.json...</p>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://github.com/AmanCode22/ethos-foundry" target="_blank" rel="noopener">GitHub</a>
            <a href="https://github.com/AmanCode22/ethos-lang/blob/main/DOCS.md" target="_blank" rel="noopener">Docs</a>
            <a href="https://github.com/AmanCode22/forge" target="_blank" rel="noopener">Forge</a>
        </div>
        <span>Built by <a href="https://github.com/AmanCode22" target="_blank" rel="noopener">Aman</a> (Class 9, India)</span>
    </footer>

    <script>
        let traits = {};

        function copyInstall(traitName) {
            const cmd = `forge foundry get ${traitName}`;
            navigator.clipboard?.writeText(cmd).then(() => {
                const btn = event.target;
                const original = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.background = 'var(--success-bg)';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = '';
                }, 1500);
            }).catch(() => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = cmd;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                const btn = event.target;
                const original = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.background = 'var(--success-bg)';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = '';
                }, 1500);
            });
        }

        function render(filter = '') {
            const el = document.getElementById('list');            const q = filter.trim().toLowerCase();
            
            const items = Object.entries(traits).filter(([name, t]) => {
                if (!q) return true;
                const desc = (t.description || '').toLowerCase();
                const tags = (t.tags || []).join(' ').toLowerCase();
                return name.toLowerCase().includes(q) || desc.includes(q) || tags.includes(q);
            });

            if (items.length === 0) {
                el.innerHTML = q 
                    ? `<p class="no-traits">No traits match "<strong>${filter}</strong>"</p>` 
                    : '<p class="no-traits">No traits published yet.<br><small>Be the first to submit one!</small></p>';
                return;
            }

            el.innerHTML = items.map(([name, t]) => {
                const badge = t.verified 
                    ? '<span class="badge verified">✓ Verified</span>' 
                    : (t.tags || []).includes('official')
                        ? '<span class="badge official">★ Official</span>' 
                        : '';
                
                const author = t.author || 'Unknown';
                const desc = t.description || 'No description provided.';
                
                return `
                    <article class="trait">
                        <div class="trait-header">
                            <h3>${name}</h3>
                            ${badge}
                        </div>
                        <p>${desc}</p>
                        <p class="trait-meta">
                            <span>By ${author}</span>
                            ${t.version ? `<span>v${t.version}</span>` : ''}
                        </p>
                        <div class="install">
                            <strong>Install:</strong>
                            <code>forge foundry get ${name}</code>
                            <button class="install-btn" onclick="copyInstall('${name}')" aria-label="Copy install command">Copy</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Load traits from index.json
        fetch('index.json')
            .then(response => {                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                traits = (data && data.traits) || {};
                render();
            })
            .catch(error => {
                console.error('Failed to load index.json:', error);
                document.getElementById('list').innerHTML = 
                    '<p class="no-traits">Could not load index.json.<br><small>Make sure the file exists in the repo root.</small></p>';
            });

        // Search filter
        document.getElementById('search').addEventListener('input', (e) => {
            render(e.target.value);
        });

        // Keyboard shortcut: Ctrl/Cmd + K to focus search
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('search').focus();
            }
        });
    </script>
</body>
</html>
