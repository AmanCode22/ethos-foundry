<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Ethos Foundry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #0d0d0f;
            --ink: #e8e6e1;
            --ink-light: #8a8580;
            --ink-faint: #5a5550;
            --warm: #c75d3a;
            --warm-dim: #a3482e;
            --cool: #6b8cae;
            --rule: #1e1e22;
            --rule-heavy: #2a2a30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: #070708;
        }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 680px;
            height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        .receipt {
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .receipt::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 0;
            right: 0;
            height: 8px;
            background: radial-gradient(circle, transparent 30%, var(--rule-heavy) 35%, transparent 40%);
            background-size: 12px 8px;
            opacity: 0.3;
        }

        .stamp-void {
            display: inline-block;
            border: 2px solid var(--warm);
            color: var(--warm);
            padding: 6px 18px;
            font-family: 'Fragment Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transform: rotate(-2deg);
            margin-bottom: 32px;
            opacity: 0.9;
        }

        .code {
            font-family: 'Fragment Mono', monospace;
            font-size: clamp(4rem, 15vw, 7rem);
            font-weight: 400;
            color: var(--ink-faint);
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            font-family: 'Fragment Mono', monospace;
            font-size: 0.7rem;
            color: var(--ink-faint);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px dotted var(--rule);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .desc {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.8rem;
            color: var(--ink-light);
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .desc em {
            color: var(--warm);
            font-style: normal;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .btn {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 10px 20px;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--warm);
            color: var(--paper);
            border: 1px solid var(--warm);
        }

        .btn-primary:hover {
            background: var(--warm-dim);
            border-color: var(--warm-dim);
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink-light);
            border: 1px dashed var(--rule-heavy);
        }

        .btn-ghost:hover {
            border-style: solid;
            border-color: var(--ink-faint);
            color: var(--ink);
        }

        .receipt-footer {
            border-top: 2px dashed var(--rule);
            padding-top: 24px;
        }

        .barcode {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.85rem;
            color: var(--ink-faint);
            letter-spacing: 0.15em;
            margin-bottom: 16px;
            opacity: 0.3;
            word-break: break-all;
        }

        .meta {
            font-family: 'Fragment Mono', monospace;
            font-size: 0.65rem;
            color: var(--ink-faint);
            font-style: italic;
        }

        .meta a {
            color: var(--ink-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        .meta a:hover {
            color: var(--warm);
        }

        @media (max-width: 480px) {
            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                text-align: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="stamp-void">void</div>

        <div class="code">404</div>

        <div class="divider">trait not found</div>

        <h1>Nothing here</h1>
        <p class="desc">
            The path <em id="path-display">this page</em> doesn't exist in the registry or was moved.
        </p>

        <div class="actions">
            <a href="https://foundry-ethos.pages.dev/" class="btn btn-primary">cloudflare registry</a>
            <a href="https://amancode22.github.io/ethos-foundry/" class="btn btn-primary">github registry</a>
            <a href="https://github.com/AmanCode22/ethos-foundry" target="_blank" rel="noopener" class="btn btn-ghost">view source</a>
        </div>

        <div class="receipt-footer">
            <div class="barcode">|| | ||| | | |||| | || | ||| | | |||</div>
            <div class="meta">
                ethos foundry · built by <a href="https://github.com/AmanCode22" target="_blank" rel="noopener">aman adlakha</a>
            </div>
        </div>
    </div>

    <script>
        const p = window.location.pathname;
        if (p && p !== '/') {
            document.getElementById('path-display').textContent = p;
        }
    </script>
</body>
</html>
