<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Ethos Foundry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b10;
            --surface: #0e1420;
            --surface2: #141c2e;
            --border: #1e2d47;
            --border-bright: #2a4060;
            --text: #dce8f5;
            --text-dim: #5a7a9a;
            --text-mid: #8aaac8;
            --accent: #3d9fff;
            --accent2: #00d4aa;
            --code: #ff6b8a;
            --mono: "JetBrains Mono", monospace;
            --sans: "Syne", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 50% 40% at 70% 20%, rgba(255,107,138,0.05) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 20% 75%, rgba(61,159,255,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .wrap {
            text-align: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease both;
        }

        .glitch-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .code {
            font-family: var(--mono);
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 1px var(--border-bright);
            letter-spacing: -0.04em;
            position: relative;
            line-height: 1;
            display: block;
        }

        .code::before,
        .code::after {
            content: '404';
            position: absolute;
            top: 0; left: 0; right: 0;
            font-family: var(--mono);
            font-size: inherit;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .code::before {
            color: var(--accent);
            opacity: 0.4;
            animation: glitch1 4s infinite;
        }

        .code::after {
            color: var(--code);
            opacity: 0.3;
            animation: glitch2 4s infinite;
        }

        .label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .label::before,
        .label::after {
            content: '';
            height: 1px;
            width: 40px;
            background: var(--border);
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 10px;
        }

        .desc {
            color: var(--text-mid);
            font-size: 0.88rem;
            font-family: var(--mono);
            max-width: 360px;
            margin: 0 auto 36px;
            line-height: 1.7;
        }

        .desc em {
            color: var(--code);
            font-style: normal;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, var(--accent), rgba(61,159,255,0.7));
            color: #080b10;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            font-family: var(--mono);
            letter-spacing: 0.03em;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-primary:active { transform: scale(0.97); }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            color: var(--text-mid);
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--mono);
            letter-spacing: 0.03em;
            border: 1px solid var(--border);
            transition: border-color 0.15s, color 0.15s, transform 0.1s;
        }

        .btn-ghost:hover {
            border-color: var(--border-bright);
            color: var(--text);
            transform: translateY(-1px);
        }

        .footer-note {
            margin-top: 56px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            opacity: 0.5;
        }

        .footer-note a {
            color: inherit;
            text-decoration: none;
        }

        .footer-note a:hover { opacity: 1; color: var(--text-mid); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glitch1 {
            0%, 90%, 100% { clip-path: none; transform: none; }
            92% { clip-path: inset(30% 0 40% 0); transform: translateX(-4px); }
            94% { clip-path: inset(60% 0 10% 0); transform: translateX(4px); }
            96% { clip-path: inset(10% 0 70% 0); transform: translateX(-2px); }
        }

        @keyframes glitch2 {
            0%, 88%, 100% { clip-path: none; transform: none; }
            90% { clip-path: inset(50% 0 20% 0); transform: translateX(5px); }
            93% { clip-path: inset(20% 0 60% 0); transform: translateX(-3px); }
            95% { clip-path: inset(70% 0 5% 0); transform: translateX(2px); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            .actions { flex-direction: column; align-items: center; }
            .btn-primary, .btn-ghost { width: 100%; max-width: 260px; justify-content: center; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="glitch-wrap">
            <span class="code">404</span>
        </div>

        <p class="label">trait not found</p>

        <h1>Nothing here but static.</h1>
        <p class="desc">
            The path <em id="path-display"></em> doesn't exist in the registry or was moved.
        </p>

        <div class="actions">
            <a href="/" class="btn-primary">← back to registry</a>
            <a href="https://github.com/AmanCode22/ethos-foundry" target="_blank" rel="noopener" class="btn-ghost">view on github</a>
        </div>

        <p class="footer-note">
            ethos foundry · built by <a href="https://github.com/AmanCode22" target="_blank" rel="noopener">aman</a>
        </p>
    </div>

    <script>
        const p = window.location.pathname;
        if (p && p !== '/') {
            document.getElementById('path-display').textContent = p;
        } else {
            document.getElementById('path-display').textContent = 'this page';
        }
    </script>
</body>
</html>
